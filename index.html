<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>조디악방 판떼기</title>
    <style>
        :root {
            --ow-orange: #f06414;
            --bg-body: #121417;
            --bg-panel: #1e2126;
            --text-main: #e0e0e0;
            --border-color: #383e47;
            --card-width: 315px;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 15px 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .feedback-notice {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 0.85rem;
            color: #888;
            font-weight: 500;
        }
        .feedback-notice b { color: var(--ow-orange); }

        h1 { margin: 10px 0 20px 0 !important; font-size: 2.5rem !important; font-weight: 900; letter-spacing: -1px; color: #fff; }
        .top-container { display: grid; grid-template-columns: 0.8fr 1.8fr 1fr; gap: 15px; width: 100%; max-width: 1600px; margin-bottom: 20px; align-items: stretch; }
        .panel { background: var(--bg-panel); border-radius: 12px; border: 1px solid var(--border-color); padding: 15px; display: flex; flex-direction: column; }
        .panel-title { font-size: 0.9rem; font-weight: 800; color: var(--ow-orange); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        #nameInput { width: 100%; padding: 10px; background: #121417; border: 1px solid var(--border-color); border-radius: 8px; color: #fff; font-size: 1.05rem; outline: none; box-sizing: border-box; }
        #waitingPool { display: flex; flex-direction: column; gap: 0px; }
        .pool-row { display: flex; align-items: center; gap: 10px; padding: 4px 8px; border-bottom: 1px solid #2a2e35; min-height: 42px; }
        .pool-row-label { width: 55px; font-size: 0.75rem; font-weight: 800; color: #777; flex-shrink: 0; text-align: center; border-right: 1px solid #333; }
        .pool-row-content { display: flex; flex-wrap: wrap; gap: 6px; flex-grow: 1; min-height: 35px; }
        .player-tag { background: #ffffff; color: #000; padding: 5px 12px; border-radius: 5px; font-weight: 800; cursor: grab; font-size: 1rem; display: inline-flex; align-items: center; box-shadow: 0 3px 5px rgba(0,0,0,0.3); }
        .tier-select-mini { background: #fff; color: #000; border: none; font-weight: 900; font-size: 0.75rem; cursor: pointer; margin-right: 6px; border-radius: 4px; padding: 1px 3px; }
        .name-text { cursor: pointer; }
        .name-text:hover { color: var(--ow-orange); }
        
        .game-nav { display: flex; flex-direction: column; gap: 10px; }
        .nav-row { display: flex; gap: 6px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .btn { padding: 7px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid var(--border-color); background: transparent; color: #888; font-size: 0.9rem; }
        .btn.active { background: var(--ow-orange); color: white; border-color: var(--ow-orange); }
        .btn-shuffle { background: #3498db; color: white; border: none; padding: 12px; font-size: 1.4rem; border-radius: 10px; cursor: pointer; font-weight: 900; margin-top: 5px; }
        .shuffle-option-box { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-top: 5px; margin-bottom: 5px; }
        .shuffle-option { display: flex; align-items: center; gap: 6px; color: #888; font-size: 0.75rem; cursor: pointer; user-select: none; }
        .shuffle-option input { cursor: pointer; margin: 0; width: 14px; height: 14px; }
        
        /* 버튼 컨테이너 및 공통 스타일 */
        .btn-group { display: flex; gap: 5px; }
        .btn-clear { background: #c0392b; color: white; border: none; padding: 3px 7px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        .btn-return { background: #555; color: white; border: none; padding: 3px 7px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        .btn-return:hover { background: #777; }
        
        #teamCountSelect {
            background: #121417;
            color: var(--ow-orange);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        #ladderWidget { margin-top: 8px; position: relative; }
        #ladderToggle { width: 100%; background: #27ae60; color: white; border: none; border-radius: 8px; padding: 10px; font-weight: 800; cursor: pointer; font-size: 1rem; }
        #ladderBox { display: none; position: absolute; right: 0; top: 50px; z-index: 1000; background: #1e2126; border: 2px solid #27ae60; border-radius: 12px; padding: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.9); width: 280px; }
        .ladder-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .cap-input { flex: 1; background: #121417; border: 1px solid #333; color: #fff; padding: 6px; border-radius: 4px; font-size: 0.9rem; }
        .board { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; width: 100%; padding: 10px; margin-top: 10px; }
        .team-card { background: var(--bg-panel); border-radius: 12px; padding: 15px; border-top: 10px solid #555; width: var(--card-width); flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .team-1 { border-top-color: #3498db; } .team-2 { border-top-color: #e74c3c; } 
        .team-3 { border-top-color: #f1c40f; } .team-4 { border-top-color: #9b59b6; }
        .team-5 { border-top-color: #1abc9c; } .team-6 { border-top-color: #e67e22; }
        .team-7 { border-top-color: #ecf0f1; } .team-8 { border-top-color: #95a5a6; }
        .team-9 { border-top-color: #34495e; } .team-10 { border-top-color: #27ae60; }

        .team-title { text-align: center; font-size: 1.6rem; font-weight: 900; margin-bottom: 15px; }
        .slot { background: #121417; border: 1px dashed #333; margin-bottom: 8px; padding: 8px 14px; border-radius: 10px; display: flex; align-items: center; min-height: 52px; gap: 12px; position: relative; }
        .slot-label { width: 60px; font-weight: 800; color: var(--ow-orange); font-size: 0.8rem; }
        .lock-btn { margin-left: auto; cursor: pointer; opacity: 0.2; font-size: 1.4rem; transition: 0.2s; }
        .lock-btn.locked { opacity: 1; color: var(--ow-orange); }
        .remove-btn { color: #ff4d4d; font-size: 0.85rem; cursor: pointer; margin-left: 6px; }

        .map-unit { padding:4px 10px; background:#1e2126; border:1px solid #383e47; border-radius:6px; font-size:0.85rem; cursor:pointer; color:#bbb; transition: 0.2s; }
        .map-unit:hover { background: #2a2e35; color: #fff; }
        .map-unit.done { text-decoration: line-through; color: #555 !important; opacity: 0.5; background: #121417; border-color: #222; }
        
        .text-red { color: #ff4d4d !important; font-weight: bold; }
        .map-header { text-align: center; margin-bottom: 20px; width: 100%; }
        .map-header .title { font-size: 1.5rem; font-weight: 900; color: #3498db; display: block; margin-bottom: 5px; }
        
        .slot-group-divider { height: 1px; background: #333; margin: 15px 0; position: relative; }
        .slot-group-divider::after { content: "Next Squad"; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: var(--bg-panel); padding: 0 10px; font-size: 0.65rem; color: #555; font-weight: bold; text-transform: uppercase; }

        /* 이동 팝업 스타일 */
        #movePopupOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        #movePopup { background: #1e2126; border: 2px solid var(--ow-orange); border-radius: 15px; width: 500px; padding: 20px; box-shadow: 0 0 30px rgba(240, 100, 20, 0.3); }
        .popup-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 15px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .move-option-grid { display: flex; flex-direction: column; gap: 10px; max-height: 60vh; overflow-y: auto; padding-right: 5px; }
        .move-option-grid::-webkit-scrollbar { width: 6px; }
        .move-option-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .move-btn { background: #2a2e35; border: 1px solid #383e47; color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.2s; display: flex; flex-direction: column; gap: 4px; }
        .move-btn:hover { background: var(--ow-orange); border-color: var(--ow-orange); }
        .move-btn .team-info { font-size: 0.75rem; color: #aaa; font-weight: normal; }
        .move-btn:hover .team-info { color: #fff; opacity: 0.8; }
        .move-btn.pool-btn { background: #34495e; text-align: center; align-items: center; }
    </style>
</head>
<body>

    <div class="feedback-notice">
        개선사항은 SOOP 닉네임 <b>H4rry_</b> 로 쪽지 보내주세요.
    </div>

    <h1>조디악방 판떼기</h1>

    <div class="top-container">
        <div class="panel">
            <div class="panel-title">스트리머 등록</div>
            <input type="text" id="nameInput" placeholder="이름 입력 (공백/쉼표/엔터)">
        </div>
        <div class="panel">
            <div class="panel-title">
                <span>👆이름 드래그/클릭 <small style="font-size: 0.75rem; color: #666;">🔒ON/OFF시 팀장지정 , 묶밸 가능</small></span>
                <div class="btn-group">
                    <button class="btn-return" onclick="returnAllToPool()">팀원 대기실로</button>
                    <button class="btn-clear" onclick="clearAllPlayers()">전체 초기화</button>
                </div>
            </div>
            <div id="waitingPool"></div>
        </div>
        <div class="panel">
            <div class="game-nav">
                <div class="nav-row">
                    <button class="btn active" onclick="setGame('LOL', this)">LOL</button>
                    <button class="btn" onclick="setGame('OW5', this)">OW 5:5</button>
                    <button class="btn" onclick="setGame('OW6', this)">OW 6:6</button>
                    <button class="btn" onclick="setGame('PUBG', this)">PUBG</button>
                </div>
                
                <div class="nav-row" style="margin-top: 5px;">
                    <span style="font-size: 0.75rem; color: #666; margin-right: 5px;">팀 수 선택:</span>
                    <select id="teamCountSelect" onchange="setTeamCount(this.value)">
                        <option value="2">2팀</option>
                        <option value="3">3팀</option>
                        <option value="4">4팀</option>
                        <option value="5">5팀</option>
                        <option value="6">6팀</option>
                        <option value="7">7팀</option>
                        <option value="8">8팀</option>
                        <option value="9">9팀</option>
                        <option value="10">10팀</option>
                    </select>
                </div>

                <button class="btn-shuffle" onclick="shuffleLogic()">랜덤 섞기</button>
                <div class="shuffle-option-box">
                    <label class="shuffle-option"><input type="checkbox" id="mixPosition"> 포지션까지 섞기</label>
                    <label id="pubg8Option" class="shuffle-option" style="display: none; color: #aaa;">
                        <input type="checkbox" id="isPubg8" onchange="renderBoard(); saveAllData();"> 8인 팀 구성
                    </label>
                </div>
                <div id="ladderWidget">
                    <button id="ladderToggle" onclick="toggleLadder()">🎲 팀뽑 순서 정하기</button>
                    <div id="ladderBox">
                        <div class="panel-title" style="color:#27ae60">🎲 순서 정하기 <span style="cursor:pointer;color:#888;" onclick="toggleLadder()">✕</span></div>
                        <div id="ladderResult"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="board" id="gameBoard"></div>

    <div class="panel" style="width: 100%; max-width: 1600px; margin-top: 20px; border-color: #3498db;">
        <div class="map-header">
            <span class="title">오버워치 맵 추첨</span>
            <span style="color: #FFFFFF; font-size: 0.85rem;">✔️또는 맵클릭으로 각각 제외가능 , <span class="text-red">빨간글씨</span>는 MZ맵입니다</span>
        </div>
        <div id="mapContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px;"></div>
        <div style="text-align: center; margin-top: 20px; padding: 20px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <div id="mapResult" style="font-size: 2rem; font-weight: 900; color: #fff; min-height: 60px; line-height: 1.2;">
                <span style="color: #555; font-size: 1.2rem;">추첨 버튼을 눌러주세요</span>
            </div>
            <button class="btn-shuffle" style="background: #27ae60; min-width: 250px; font-size: 1.2rem;" onclick="drawMap()">맵 랜덤 추첨</button>
        </div>
    </div>

    <div id="movePopupOverlay" onclick="closeMovePopup()">
        <div id="movePopup" onclick="event.stopPropagation()">
            <div class="popup-title">어디로 이동할까요?</div>
            <div id="moveOptions" class="move-option-grid"></div>
        </div>
    </div>

<script>
    let currentGame = 'LOL', currentTeamCount = 2, lastCaptains = [];
    let activePlayerId = null; 
    const STORAGE_KEY = "ZODIAC_BOARD_DATA_V2";
    
    const CONFIG = {
        'LOL': { type: 'pos', pos: ['탑', '정글', '미드', '원딜', '서폿'], options: ['탑', '정글', '미드', '원딜', '서폿', '❓']},
        'OW5': { type: 'pos', pos: ['탱커', '딜러1', '딜러2', '힐러1', '힐러2'], options: ['탱커', '딜러1', '딜러2', '힐러1', '힐러2', '❓']},
        'OW6': { type: 'pos', pos: ['탱커1', '탱커2', '딜러1', '딜러2', '힐러1', '힐러2'], options: ['탱커1', '탱커2', '딜러1', '딜러2', '힐러1', '힐러2','❓']},
        'PUBG': { 
            type: 'tier', 
            pos: ['1번핑', '2번핑', '3번핑', '4번핑'], 
            pos8: ['1번핑', '2번핑', '3번핑', '4번핑', '1번핑', '2번핑', '3번핑', '4번핑'], 
            options: ['1티어', '2티어', '3티어', '4티어', '5티어', '6티어', '7티어', '8티어', '아가티어']
        }
    };

    const owMaps = {
        "쟁탈": ["네팔", "리장 타워", "부산", "사모아", "오아시스", "일리오스"],
        "호위": ["66번 국도", "지브롤터", "도라도", "리알토", "샴발리 수도원", "서킷 로얄", "쓰레기촌", "하바나"],
        "혼합": ["눔바니", "미드타운", "블리자드 월드", "아이헨발데", "왕의 길", "파라이수", "할리우드"],
        "밀기": ["뉴 퀸 스트리트", "이스페란사", "콜로세오", "루나사피"],
        "플래시포인트": ["뉴 정크 시티", "수라바사", "아틀리스"],
        "점령": ["볼스카야 인더스트리", "아누비스 신전", "파리", "하나무라", "호라이즌 달 기지"]
    };

    const nameInput = document.getElementById('nameInput');
    const waitingPool = document.getElementById('waitingPool');

    function saveAllData() {
        const data = {
            currentGame,
            currentTeamCount,
            isPubg8: document.getElementById('isPubg8').checked,
            players: Array.from(document.querySelectorAll('.player-tag')).map(p => ({
                name: p.querySelector('.name-text').innerText,
                val: p.dataset.val,
                isLocked: p.dataset.isLocked,
                parentType: p.parentElement.classList.contains('slot') ? 'slot' : 'pool',
                pos: p.parentElement.dataset.pos || null,
                team: p.parentElement.classList.contains('slot') ? p.parentElement.parentElement.className.match(/team-(\d+)/)[1] : null,
                rowVal: p.parentElement.dataset.rowVal || null
            })),
            mapStates: Array.from(document.querySelectorAll('.map-unit')).map(m => ({
                name: m.textContent,
                done: m.classList.contains('done')
            })),
            catStates: Array.from(document.querySelectorAll('input[id^="cat-"]')).map(c => ({
                id: c.id,
                checked: c.checked
            }))
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadAllData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) {
            renderPoolRows(); renderBoard(); initMapManager();
            return;
        }
        const data = JSON.parse(saved);
        currentGame = data.currentGame;
        currentTeamCount = data.currentTeamCount || 2;
        if(data.isPubg8 !== undefined) document.getElementById('isPubg8').checked = data.isPubg8;

        document.querySelectorAll('.game-nav .btn').forEach(b => {
            const clickAttr = b.getAttribute('onclick');
            if(clickAttr && clickAttr.includes(`'${currentGame}'`)) b.classList.add('active');
            else b.classList.remove('active');
        });
        
        togglePubgOption();
        document.getElementById('teamCountSelect').value = currentTeamCount;

        renderPoolRows();
        renderBoard();
        initMapManager();

        data.players.forEach(p => {
            const tag = createTagElement(p.name, p.val, p.isLocked);
            if (p.parentType === 'slot') {
                const teamCard = document.querySelector(`.team-${p.team}`);
                if(teamCard) {
                    const slot = Array.from(teamCard.querySelectorAll('.slot')).find(s => s.dataset.pos === p.pos && !s.querySelector('.player-tag'));
                    if (slot) {
                        slot.appendChild(tag);
                        syncLockStates(slot, tag);
                    }
                }
            } else {
                const row = waitingPool.querySelector(`[data-row-val="${p.rowVal}"]`);
                if (row) row.appendChild(tag);
            }
        });

        if(data.mapStates) {
            document.querySelectorAll('.map-unit').forEach(m => {
                const state = data.mapStates.find(s => s.name === m.textContent);
                if(state && state.done) m.classList.add('done');
            });
        }
    }

    function togglePubgOption() {
        const opt = document.getElementById('pubg8Option');
        opt.style.display = (currentGame === 'PUBG') ? 'flex' : 'none';
        if (currentGame !== 'PUBG') document.getElementById('isPubg8').checked = false;
    }

    nameInput.addEventListener('input', (e) => {
        const val = nameInput.value;
        if (val.includes(',') || val.includes(' ')) processNames(val);
    });

    nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); processNames(nameInput.value); }
    });

    function processNames(inputStr) {
        const names = inputStr.split(/[,\s\n\r]+/).filter(n => n.trim() !== "");
        names.forEach(n => {
            const tag = createTagElement(n.trim());
            const opts = CONFIG[currentGame].options;
            const defaultVal = opts[opts.length - 1];
            const targetRow = waitingPool.querySelector(`[data-row-val="${defaultVal}"]`); 
            if(targetRow) targetRow.appendChild(tag);
        });
        nameInput.value = '';
        saveAllData();
    }

    function createTagElement(name, val, isLocked = "false") {
        const opts = CONFIG[currentGame].options;
        const tag = document.createElement('div'); tag.className = 'player-tag'; tag.id = 'p-' + Math.random().toString(36).substr(2, 9);
        const currentVal = val || opts[opts.length - 1];
        tag.dataset.val = currentVal; tag.dataset.isLocked = isLocked; tag.draggable = true;
        tag.innerHTML = `<select class="tier-select-mini" onchange="updateTagRow(this.parentElement, this.value)">${opts.map(o => `<option value="${o}" ${o==currentVal ? 'selected' : ''}>${o}</option>`).join('')}</select><span class="name-text" onclick="openMovePopup('${tag.id}')">${name}</span><span class="remove-btn" onclick="this.parentElement.remove(); saveAllData();">✕</span>`;
        tag.ondragstart = (ev) => ev.dataTransfer.setData("text", ev.target.id);
        return tag;
    }

    /* 팝업 관련 함수들 */
    function openMovePopup(id) {
        activePlayerId = id;
        const player = document.getElementById(id);
        if(!player) return;
        const playerName = player.querySelector('.name-text').innerText;
        const optionsDiv = document.getElementById('moveOptions');
        optionsDiv.innerHTML = "";
        
        document.querySelector('.popup-title').innerText = `${playerName} 선수 이동`;

        const poolBtn = document.createElement('div');
        poolBtn.className = 'move-btn pool-btn';
        poolBtn.innerText = "⚓ 대기석으로 이동";
        poolBtn.onclick = () => movePlayerToPosition('pool');
        optionsDiv.appendChild(poolBtn);

        for(let i=1; i<=currentTeamCount; i++) {
            const teamCard = document.querySelector(`.team-${i}`);
            const members = Array.from(teamCard.querySelectorAll('.player-tag .name-text')).map(n => n.innerText);
            const btn = document.createElement('div');
            btn.className = 'move-btn';
            let infoText = members.length > 0 ? `(${members.length}명): ${members.join(', ')}` : `(0명): 비어있음`;
            btn.innerHTML = `<span>TEAM ${i}</span><span class="team-info">${infoText}</span>`;
            btn.onclick = () => movePlayerToPosition('team', i);
            optionsDiv.appendChild(btn);
        }
        document.getElementById('movePopupOverlay').style.display = "flex";
    }

    function closeMovePopup() {
        document.getElementById('movePopupOverlay').style.display = "none";
        activePlayerId = null;
    }

    function movePlayerToPosition(type, teamNum) {
        const player = document.getElementById(activePlayerId);
        if(!player) return;
        const sourceSlot = player.parentElement;
        if(type === 'pool') {
            const row = waitingPool.querySelector(`[data-row-val="${player.dataset.val}"]`);
            if(row) row.appendChild(player);
            if (sourceSlot.classList.contains('slot')) syncLockStates(sourceSlot, null);
        } else {
            const teamCard = document.querySelector(`.team-${teamNum}`);
            let targetSlot = Array.from(teamCard.querySelectorAll('.slot')).find(s => s.dataset.pos === player.dataset.val && !s.querySelector('.player-tag'));
            if(!targetSlot) targetSlot = teamCard.querySelector('.slot:not(:has(.player-tag))');
            if(targetSlot) {
                if (sourceSlot.classList.contains('slot')) syncLockStates(sourceSlot, null);
                targetSlot.appendChild(player);
                updatePlayerValue(player, targetSlot.dataset.pos);
                syncLockStates(targetSlot, player);
            } else {
                alert(`TEAM ${teamNum}에 빈 자리가 없습니다!`);
                return;
            }
        }
        saveAllData();
        closeMovePopup();
    }

    /* 팀원 대기실로 이동 로직 */
    function returnAllToPool() {
        const teamPlayers = Array.from(document.querySelectorAll('.slot .player-tag'));
        if(teamPlayers.length === 0) return;
        
        teamPlayers.forEach(p => {
            const sourceSlot = p.parentElement;
            // 잠금 해제
            p.dataset.isLocked = "false";
            syncLockStates(sourceSlot, null);
            
            // 본인 밸류에 맞는 대기실 줄로 이동
            const row = waitingPool.querySelector(`[data-row-val="${p.dataset.val}"]`);
            if(row) row.appendChild(p);
        });
        saveAllData();
    }

    function toggleLadder() { const box = document.getElementById('ladderBox'); box.style.display = (box.style.display !== 'block') ? 'block' : 'none'; if (box.style.display === 'block') renderCaptainInputs(); }
    function loadFromPool() { const names = Array.from(document.querySelectorAll('.player-tag .name-text')).map(s => s.innerText); if (names.length === 0) { alert("등록된 명단이 없습니다."); return; } lastCaptains = names; renderCaptainInputs(); }
    
    function renderCaptainInputs() {
        let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;"><span style="font-size: 0.8rem; color: #aaa;">팀장 이름 작성후 추첨.</span><button class="btn" style="padding:2px 6px; font-size:0.7rem; color:#27ae60; border-color:#27ae60;" onclick="loadFromPool()">전체 명단 불러오기</button></div><div id="capInputsArea">`;
        const count = Math.max(lastCaptains.length, currentTeamCount);
        for(let i=0; i<count; i++) { html += `<div class="ladder-row"><span style="color:#27ae60; font-weight:bold; width:20px;">${i+1}</span><input type="text" class="cap-input" value="${lastCaptains[i]||''}"> <button style="background:transparent; border:none; color:#555; cursor:pointer;" onclick="this.parentElement.remove()">✕</button></div>`; }
        html += `</div><div style="display:flex; gap:5px; margin-top:15px;"><button class="btn" style="flex:1; border-color:#555;" onclick="addCapRow()">+ 항목 추가</button><button class="btn" style="flex:1; background:#27ae60; color:#fff; border:none;" onclick="handleStartShuffle()">순서 추첨</button></div>`;
        document.getElementById('ladderResult').innerHTML = html;
    }

    function addCapRow() { const area = document.getElementById('capInputsArea'); const div = document.createElement('div'); div.className = 'ladder-row'; div.innerHTML = `<span style="color:#27ae60; font-weight:bold; width:20px;">+</span><input type="text" class="cap-input" value=""> <button style="background:transparent; border:none; color:#555; cursor:pointer;" onclick="this.parentElement.remove()">✕</button>`; area.appendChild(div); }
    function handleStartShuffle() { const inputs = document.querySelectorAll('.cap-input'); const names = Array.from(inputs).map(inp => inp.value.trim()).filter(n => n !== ""); if (names.length === 0) { alert("이름을 입력해주세요."); return; } lastCaptains = names; renderLadderResult(names); }
    
    function renderLadderResult(names) {
        const shuffled = [...names].sort(() => Math.random() - 0.5);
        let html = '<div style="margin-bottom:10px; font-weight:bold; border-bottom:1px solid #27ae60; color:#fff; padding-bottom:5px;">추첨 결과</div>';
        shuffled.forEach((name, idx) => { html += `<div class="ladder-row" style="background:rgba(255,255,255,0.05); padding:8px; border-radius:4px; margin-bottom:5px;"><span style="color:#27ae60; font-weight:bold; width:45px;">${idx + 1}순위</span><span style="color:#fff">${name}</span></div>`; });
        html += `<div style="display:flex; gap:5px; margin-top:15px;"><button class="btn" style="flex:1; border-color:#555;" onclick="renderCaptainInputs()">뒤로가기</button><button class="btn" style="flex:1; background:#3498db; color:#fff; border:none;" onclick="handleRedo()">다시 뽑기</button></div>`;
        document.getElementById('ladderResult').innerHTML = html;
    }

    function handleRedo() { renderLadderResult(lastCaptains); }
    function renderPoolRows() { waitingPool.innerHTML = ""; CONFIG[currentGame].options.forEach(opt => { const row = document.createElement('div'); row.className = 'pool-row'; row.innerHTML = `<div class="pool-row-label">${opt}</div><div class="pool-row-content" data-row-val="${opt}" ondrop="drop(event)" ondragover="allowDrop(event)"></div>`; waitingPool.appendChild(row); }); }
    
    function clearAllPlayers() { if(confirm("모든 명단을 초기화하시겠습니까?")) { renderPoolRows(); document.querySelectorAll('.slot .player-tag').forEach(p => p.remove()); document.querySelectorAll('.lock-btn').forEach(l => l.classList.remove('locked')); lastCaptains = []; localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    
    function updateTagRow(tag, newVal) { tag.dataset.val = newVal; if(tag.parentElement.classList.contains('pool-row-content')) { const targetRow = waitingPool.querySelector(`[data-row-val="${newVal}"]`); if(targetRow) targetRow.appendChild(tag); } saveAllData(); }
    
    function setGame(game, btn) { 
        currentGame = game; 
        document.querySelectorAll('.game-nav .btn').forEach(b => { if(b.getAttribute('onclick') && b.getAttribute('onclick').includes('setGame')) b.classList.remove('active'); }); 
        btn.classList.add('active'); 
        togglePubgOption();
        const players = Array.from(document.querySelectorAll('.player-tag')).map(p => ({name: p.querySelector('.name-text').innerText, val: p.dataset.val})); 
        renderPoolRows(); 
        renderBoard(); 
        players.forEach(p => { 
            const tag = createTagElement(p.name); 
            const opts = CONFIG[currentGame].options; 
            const targetRow = waitingPool.querySelector(`[data-row-val="${opts[opts.length-1]}"]`); 
            if(targetRow) targetRow.appendChild(tag); 
        }); 
        saveAllData(); 
    }
    
    function setTeamCount(count) { currentTeamCount = parseInt(count); renderBoard(); saveAllData(); }
    
    function renderBoard() {
        const board = document.getElementById('gameBoard'); 
        board.innerHTML = "";
        const isPubg8 = (currentGame === 'PUBG' && document.getElementById('isPubg8').checked);
        const positions = isPubg8 ? CONFIG.PUBG.pos8 : CONFIG[currentGame].pos;
        for (let t = 1; t <= currentTeamCount; t++) {
            const card = document.createElement('div'); card.className = `team-card team-${t}`; card.innerHTML = `<div class="team-title">TEAM ${t}</div>`;
            positions.forEach((pos, index) => { 
                if (isPubg8 && index === 4) {
                    const divider = document.createElement('div');
                    divider.className = 'slot-group-divider';
                    card.appendChild(divider);
                }
                const slot = document.createElement('div'); slot.className = 'slot'; slot.dataset.pos = pos; slot.setAttribute('ondrop', 'drop(event)'); slot.setAttribute('ondragover', 'allowDrop(event)'); 
                slot.innerHTML = `<div class="slot-label">${pos}</div><div class="lock-btn" onclick="toggleLock(this)">🔒</div>`; 
                card.appendChild(slot); 
            });
            board.appendChild(card);
        }
    }

    function toggleLock(el) { const p = el.parentElement.querySelector('.player-tag'); if (p) { const isLocked = el.classList.toggle('locked'); p.dataset.isLocked = isLocked ? "true" : "false"; } saveAllData(); }
    function syncLockStates(slot, player) { const lockBtn = slot.querySelector('.lock-btn'); if (!lockBtn) return; if (player && player.dataset.isLocked === "true") lockBtn.classList.add('locked'); else lockBtn.classList.remove('locked'); }
    
    function shuffleLogic() {
        const isMixPosition = document.getElementById('mixPosition').checked; const slots = Array.from(document.querySelectorAll('.slot'));
        document.querySelectorAll('.player-tag').forEach(p => { if (p.dataset.isLocked !== "true") { const row = waitingPool.querySelector(`[data-row-val="${p.dataset.val}"]`); if(row) row.appendChild(p); } });
        let targets = Array.from(document.querySelectorAll('.pool-row-content .player-tag')).sort(() => Math.random() - 0.5);
        if (targets.length === 0) return;
        const availableSlots = slots.filter(s => !s.querySelector('.player-tag') && !s.querySelector('.lock-btn').classList.contains('locked')).length;
        if (targets.length > availableSlots) { alert(`⚠️ 자리가 부족합니다!\n현재 비어있는 칸: ${availableSlots}개 / 대기 인원: ${targets.length}명\n팀 수를 늘리거나 명단을 조절해주세요.`); return; }
        if (CONFIG[currentGame].type === 'pos') {
            if (!isMixPosition) { targets = targets.filter(p => { if (p.dataset.val === '✨') return true; const s = slots.find(s => !s.querySelector('.player-tag') && !s.querySelector('.lock-btn').classList.contains('locked') && s.dataset.pos === p.dataset.val); if (s) { updatePlayerValue(p, s.dataset.pos); s.appendChild(p); syncLockStates(s, p); return false; } return true; }); }
            targets.forEach(p => { const s = slots.find(s => !s.querySelector('.player-tag') && !s.querySelector('.lock-btn').classList.contains('locked')); if (s) { updatePlayerValue(p, s.dataset.pos); s.appendChild(p); syncLockStates(s, p); } });
        } else {
            let groups = {}; CONFIG.PUBG.options.forEach(o => groups[o] = []); targets.forEach(p => groups[p.dataset.val].push(p)); 
            let tidx = 0;
            CONFIG.PUBG.options.forEach(o => { 
                while(groups[o].length > 0) { 
                    let s = document.querySelector(`.team-${(tidx % currentTeamCount) + 1} .slot:not(:has(.player-tag)):not(:has(.locked))`); 
                    if (s) { const tag = groups[o].shift(); s.appendChild(tag); updatePlayerValue(tag, s.dataset.pos); syncLockStates(s, tag); } 
                    tidx++; if (tidx > 1000) break; 
                } 
            });
        }
        saveAllData();
    }

    function updatePlayerValue(player, newPos) { const select = player.querySelector('.tier-select-mini'); if (select) { const hasOption = Array.from(select.options).some(opt => opt.value === newPos); if (hasOption) { select.value = newPos; player.dataset.val = newPos; } } }
    function allowDrop(ev) { ev.preventDefault(); }
    function drop(ev) {
        ev.preventDefault(); const draggedId = ev.dataTransfer.getData("text"); const dragged = document.getElementById(draggedId); let targetSlot = ev.target;
        while (targetSlot && !targetSlot.classList.contains('slot') && !targetSlot.classList.contains('pool-row-content')) targetSlot = targetSlot.parentElement;
        if (!targetSlot || !dragged) return;
        const sourceSlot = dragged.parentElement;
        if (targetSlot.classList.contains('slot')) {
            const existingPlayer = targetSlot.querySelector('.player-tag'); updatePlayerValue(dragged, targetSlot.dataset.pos);
            if (existingPlayer) { if (sourceSlot.classList.contains('slot')) { updatePlayerValue(existingPlayer, sourceSlot.dataset.pos); sourceSlot.appendChild(existingPlayer); syncLockStates(sourceSlot, existingPlayer); } else { const row = waitingPool.querySelector(`[data-row-val="${existingPlayer.dataset.val}"]`); if(row) row.appendChild(existingPlayer); } }
            else { if (sourceSlot.classList.contains('slot')) syncLockStates(sourceSlot, null); }
            targetSlot.appendChild(dragged); syncLockStates(targetSlot, dragged);
        } else { const newRowVal = targetSlot.dataset.rowVal; updatePlayerValue(dragged, newRowVal); targetSlot.appendChild(dragged); if (sourceSlot.classList.contains('slot')) syncLockStates(sourceSlot, null); }
        saveAllData();
    }

    function initMapManager() {
        const container = document.getElementById('mapContainer'); container.innerHTML = "";
        const mzMaps = ["사모아", "샴발리 수도원", "서킷 로얄", "파라이수", "뉴 퀸 스트리트", "이스페란사", "콜로세오", "루나사피", "뉴 정크 시티", "수라바사", "아틀리스"];
        for (const [cat, maps] of Object.entries(owMaps)) {
            const catBox = document.createElement('div'); catBox.style.cssText = "background: #121417; padding: 12px; border-radius: 10px; border: 1px solid #333;";
            catBox.innerHTML = `<div style="margin-bottom:10px; font-weight:bold; display:flex; align-items:center; gap:8px;"><input type="checkbox" id="cat-${cat}" checked style="width:16px; height:16px; cursor:pointer;" onchange="saveAllData()"><label for="cat-${cat}" style="color:var(--ow-orange); cursor:pointer; font-size:0.9rem;">${cat}</label></div><div id="list-${cat}" style="display:flex; flex-wrap:wrap; gap:6px;"></div>`;
            container.appendChild(catBox);
            const listDiv = catBox.querySelector(`#list-${cat}`);
            maps.forEach(m => {
                const span = document.createElement('span'); span.className = 'map-unit'; if (mzMaps.includes(m)) span.classList.add('text-red');
                span.textContent = m; span.onclick = () => { span.classList.toggle('done'); saveAllData(); };
                listDiv.appendChild(span);
            });
        }
    }

    function drawMap() {
        let pool = [];
        for (const cat in owMaps) { if (document.getElementById(`cat-${cat}`).checked) { const maps = document.querySelectorAll(`#list-${cat} .map-unit:not(.done)`); maps.forEach(m => pool.push({name: m.textContent, cat: cat})); } }
        const resDiv = document.getElementById('mapResult');
        if (pool.length === 0) { resDiv.innerHTML = "<span style='color:#ff4d4d;'>추첨할 맵이 없습니다!</span>"; return; }
        const picked = pool[Math.floor(Math.random() * pool.length)];
        const mzMaps = ["사모아", "샴발리 수도원", "서킷 로얄", "파라이수", "뉴 퀸 스트리트","이스페란사", "콜로세오", "루나사피", "뉴 정크 시티", "수라바사", "아틀리스"];
        const isMz = mzMaps.includes(picked.name);
        resDiv.innerHTML = `<span style="font-size:0.9rem; color:var(--ow-orange); opacity:0.8;">[${picked.cat}]</span><br><span class="${isMz ? 'text-red' : ''}">${picked.name}</span>`;
    }

    loadAllData();
</script>
